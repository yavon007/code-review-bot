services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      GITEA_BASE_URL: ${GITEA_BASE_URL:?GITEA_BASE_URL is required}
      GITEA_TOKEN: ${GITEA_TOKEN:?GITEA_TOKEN is required}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:?GITEA_WEBHOOK_SECRET is required}
      BOT_NAME: ${BOT_NAME:-gpt-review-bot}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      REVIEW_MODEL: ${REVIEW_MODEL:-gpt-4.1}
      REVIEW_MAX_DIFF_BYTES: ${REVIEW_MAX_DIFF_BYTES:-120000}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
    ports:
      - "127.0.0.1:8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api
