services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reviewbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-reviewbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewbot} -d ${POSTGRES_DB:-reviewbot}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-reviewbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reviewbot}?sslmode=disable
      GITEA_BASE_URL: ${GITEA_BASE_URL:?GITEA_BASE_URL is required}
      GITEA_TOKEN: ${GITEA_TOKEN:?GITEA_TOKEN is required}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:?GITEA_WEBHOOK_SECRET is required}
      BOT_NAME: ${BOT_NAME:-gpt-review-bot}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      REVIEW_MODEL: ${REVIEW_MODEL:-gpt-4.1}
      REVIEW_MAX_DIFF_BYTES: ${REVIEW_MAX_DIFF_BYTES:-120000}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5173"
    depends_on:
      - api

volumes:
  postgres_data:
