services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: reviewbot
      POSTGRES_PASSWORD: reviewbot
      POSTGRES_DB: reviewbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewbot -d reviewbot"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://reviewbot:reviewbot@postgres:5432/reviewbot?sslmode=disable
      GITEA_BASE_URL: ${GITEA_BASE_URL:-}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-dev-secret}
      BOT_NAME: ${BOT_NAME:-gpt-review-bot}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      REVIEW_MODEL: ${REVIEW_MODEL:-gpt-4.1}
      REVIEW_MAX_DIFF_BYTES: ${REVIEW_MAX_DIFF_BYTES:-120000}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
