services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: reviewbot
      POSTGRES_PASSWORD: reviewbot
      POSTGRES_DB: reviewbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewbot -d reviewbot"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://reviewbot:reviewbot@postgres:5432/reviewbot?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
